<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body { background: #111; color: white; font-family: sans-serif; }
#timer-popup {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  pointer-events: none;
}
#timer-popup.visible { display: flex !important; }
.inner {
  background: rgba(13,17,23,0.95);
  border: 3px solid #f0a500;
  border-radius: 24px;
  padding: 40px 64px;
  text-align: center;
}
.num { font-size: 8rem; color: #f0a500; line-height:1; }
.num.urgent { color: #e05252; }
</style>
</head>
<body>
<h2>ボタンを押してテスト</h2>
<button onclick="show(3)">3を表示</button>
<button onclick="show(2)">2を表示</button>
<button onclick="show(1)">1を表示</button>
<button onclick="hide()">消す</button>

<div id="timer-popup">
  <div class="inner">
    <div style="font-size:0.8rem;color:#888;letter-spacing:3px;">残り時間</div>
    <div class="num" id="num">3</div>
  </div>
</div>

<script>
function show(n) {
  const p = document.getElementById('timer-popup');
  const num = document.getElementById('num');
  num.textContent = n;
  num.classList.toggle('urgent', n <= 2);
  p.classList.add('visible');
  console.log('popup display:', window.getComputedStyle(p).display);
}
function hide() {
  document.getElementById('timer-popup').classList.remove('visible');
}
</script>
</body>
</html>
